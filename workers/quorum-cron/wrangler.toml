name = "quorum-cron"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_URL = "https://quorum.org"

# Cron triggers — runs all 3 tasks daily at 06:00 UTC
[[triggers]]
cron = "0 6 * * *"
command = "cron"

[secrets]
CRON_SECRET = ""
FIREBASE_ADMIN_CLIENT_EMAIL = ""
FIREBASE_ADMIN_PRIVATE_KEY = ""
SMTP_HOST = ""
SMTP_PORT = "587"
SMTP_USER = ""
SMTP_PASS = ""
DEFAULT_FROM_EMAIL = ""
DEFAULT_FROM_NAME = ""
