name = "quorum-cron"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_URL = "https://quorum.org"

# Cron triggers — runs all 3 tasks daily at 06:00 UTC
[[triggers]]
cron = "0 6 * * *"
command = "cron"

[secrets]
CRON_SECRET = ""
FIREBASE_ADMIN_CLIENT_EMAIL = ""
FIREBASE_ADMIN_PRIVATE_KEY = ""
QUORUM_PAYMENTS_URL = ""
QUORUM_PAYMENTS_API_KEY = ""
QUORUM_COMM_URL = ""
QUORUM_COMM_API_KEY = ""
